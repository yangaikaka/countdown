<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>八周倒计时</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=JetBrains+Mono:wght@300;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint:   #C8E6C9;
      --sky:    #BBDEFB;
      --peach:  #FFE0B2;
      --sage:   #A5D6A7;
      --cloud:  #FAFAFA;
      --ink:    #37474F;
      --ink2:   #607D8B;
      --gold:   #F9A825;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── Animated gradient background ── */
    body {
      background: linear-gradient(135deg, #E8F5E9 0%, #E3F2FD 35%, #FFF3E0 65%, #FCE4EC 100%);
      background-size: 400% 400%;
      animation: gradientShift 18s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Floating blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      animation: float linear infinite;
    }
    .blob-1 { width: 320px; height: 320px; background: var(--mint);  top: -80px;  left: -80px;  animation-duration: 22s; }
    .blob-2 { width: 260px; height: 260px; background: var(--sky);   bottom: -60px; right: -60px; animation-duration: 28s; animation-direction: reverse; }
    .blob-3 { width: 180px; height: 180px; background: var(--peach); top: 50%;    left: 60%;   animation-duration: 19s; }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 32px;
      padding: 52px 56px 44px;
      max-width: 660px;
      width: 92vw;
      box-shadow:
        0 8px 40px rgba(100, 140, 160, 0.14),
        0 1px 0 rgba(255,255,255,0.9) inset;
      text-align: center;
    }

    /* ── Header ── */
    .label-top {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.25;
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--ink2);
      margin-bottom: 40px;
    }

    /* ── Countdown grid ── */
    .countdown-grid {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .digit-box {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(200,230,210,0.6);
      border-radius: 16px;
      padding: 14px 0;
      width: 100px;
      box-shadow: 0 2px 12px rgba(100,160,130,0.08);
      position: relative;
      overflow: hidden;
    }

    .digit-box::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(150, 200, 170, 0.3);
    }

    .digit {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.02em;
      transition: transform 0.18s cubic-bezier(.4,0,.2,1), opacity 0.18s;
      display: block;
    }

    .digit.flip {
      animation: flipDown 0.22s ease-out;
    }

    @keyframes flipDown {
      0%   { transform: translateY(-8px); opacity: 0.4; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .unit-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink2);
    }

    /* ── Separator dots ── */
    .sep {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      color: var(--sage);
      line-height: 1;
      padding-top: 14px;
      user-select: none;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 28px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--ink2);
      margin-bottom: 7px;
    }

    .progress-track {
      height: 8px;
      background: rgba(180,210,200,0.25);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #A5D6A7, #64B5F6, #FFCC80);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Footer ── */
    .footer-note {
      font-size: 0.78rem;
      color: var(--ink2);
      opacity: 0.7;
    }

    /* ── Done state ── */
    #done-screen {
      display: none;
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    .done-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 24px;
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      0%   { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .done-title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 12px;
      animation: popIn 0.7s 0.1s cubic-bezier(.34,1.56,.64,1) both;
    }

    .done-sub {
      font-size: 1rem;
      color: var(--ink2);
      animation: popIn 0.7s 0.2s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .digit-box { width: 72px; }
      .countdown-grid { gap: 8px; }
      .sep { font-size: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      body, .blob, .progress-fill { animation: none; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Countdown card -->
  <div class="card" id="countdown-screen">
    <p class="label-top">倒计时中</p>
    <h1>还有八周</h1>
    <p class="subtitle">截止 2026 年 8 月 8 日 22:58</p>

    <div class="countdown-grid">
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-days">00</span></div>
        <span class="unit-label">天</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-hours">00</span></div>
        <span class="unit-label">时</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-mins">00</span></div>
        <span class="unit-label">分</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-secs">00</span></div>
        <span class="unit-label">秒</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>开始 · 2026/06/13</span>
        <span id="pct-label">0%</span>
        <span>结束 · 2026/08/08</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <p class="footer-note">⏳ 每一秒都在靠近目标</p>
  </div>

  <!-- Done screen -->
  <div id="done-screen">
    <span class="done-emoji">🎉</span>
    <p class="done-title">时间到</p>
    <p class="done-sub">八周已过，新的起点就在眼前。</p>
  </div>

  <script>
    // ── Target: 2026-08-08 22:58:00 (local time) ──
    const TARGET = new Date(2026, 7, 8, 22, 58, 0).getTime();
    const START  = new Date(2026, 5, 13, 22, 58, 0).getTime(); // 2026-06-13 22:58

    const pad = n => String(n).padStart(2, '0');

    const el = {
      days:     document.getElementById('d-days'),
      hours:    document.getElementById('d-hours'),
      mins:     document.getElementById('d-mins'),
      secs:     document.getElementById('d-secs'),
      fill:     document.getElementById('progress-fill'),
      pct:      document.getElementById('pct-label'),
      screen:   document.getElementById('countdown-screen'),
      done:     document.getElementById('done-screen'),
    };

    // Flip animation helper
    function setDigit(elem, val) {
      const newVal = pad(val);
      if (elem.textContent !== newVal) {
        elem.classList.remove('flip');
        void elem.offsetWidth; // reflow
        elem.classList.add('flip');
        elem.textContent = newVal;
      }
    }

    function tick() {
      const now  = Date.now();
      const diff = TARGET - now;

      if (diff <= 0) {
        el.screen.style.display = 'none';
        el.done.style.display   = 'block';
        return;
      }

      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000)  / 60000);
      const secs  = Math.floor((diff % 60000)    / 1000);

      setDigit(el.days,  days);
      setDigit(el.hours, hours);
      setDigit(el.mins,  mins);
      setDigit(el.secs,  secs);

      // Progress
      const total   = TARGET - START;
      const elapsed = now - START;
      const pct     = Math.min(100, Math.max(0, (elapsed / total) * 100));
      el.fill.style.width = pct.toFixed(2) + '%';
      el.pct.textContent  = pct.toFixed(1) + '%';
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
