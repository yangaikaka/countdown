<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>两个月倒计时 ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=JetBrains+Mono:wght@300;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:   #F48FB1;
      --pink:   #FCE4EC;
      --lilac:  #E1BEE7;
      --peach:  #FFE0B2;
      --ink:    #5D3A4A;
      --ink2:   #9C6B7E;
      --white:  rgba(255,255,255,0.75);
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #FCE4EC 0%, #F3E5F5 35%, #FFE0B2 65%, #FCE4EC 100%);
      background-size: 400% 400%;
      animation: gradientShift 16s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Floating hearts ── */
    #hearts-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.4;
      pointer-events: none;
      animation: blobFloat linear infinite;
    }
    .blob-1 { width: 340px; height: 340px; background: #F48FB1; top: -100px; left: -100px; animation-duration: 20s; }
    .blob-2 { width: 280px; height: 280px; background: #CE93D8; bottom: -80px; right: -80px; animation-duration: 26s; animation-direction: reverse; }
    .blob-3 { width: 200px; height: 200px; background: #FFCC80; top: 55%; left: 55%; animation-duration: 17s; }

    @keyframes blobFloat {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(28px,-18px) scale(1.06); }
      66%  { transform: translate(-18px,28px) scale(0.96); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 36px;
      padding: 50px 52px 42px;
      max-width: 660px;
      width: 92vw;
      box-shadow:
        0 8px 48px rgba(200, 100, 140, 0.13),
        0 1px 0 rgba(255,255,255,0.95) inset;
      text-align: center;
    }

    .label-top {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.87rem;
      color: var(--ink2);
      margin-bottom: 38px;
    }

    /* ── Countdown ── */
    .countdown-grid {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 34px;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .digit-box {
      background: rgba(255,255,255,0.88);
      border: 1.5px solid rgba(244,143,177,0.35);
      border-radius: 18px;
      padding: 14px 0;
      width: 96px;
      box-shadow:
        0 2px 14px rgba(220,100,140,0.09),
        0 0 0 3px rgba(244,143,177,0.08);
      position: relative;
      overflow: hidden;
    }

    .digit-box::after {
      content: '';
      position: absolute;
      left: 10%; right: 10%;
      top: 50%;
      height: 1px;
      background: rgba(244,143,177,0.2);
    }

    .digit {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
      display: block;
    }

    .digit.flip {
      animation: flipDown 0.2s ease-out;
    }

    @keyframes flipDown {
      0%   { transform: translateY(-8px); opacity: 0.3; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .unit-label {
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink2);
    }

    .sep {
      font-size: 2.2rem;
      color: var(--rose);
      line-height: 1;
      padding-top: 12px;
      user-select: none;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 26px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.71rem;
      color: var(--ink2);
