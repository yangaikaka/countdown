<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>两个月倒计时 ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=JetBrains+Mono:wght@300;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:   #F48FB1;
      --pink:   #FCE4EC;
      --lilac:  #E1BEE7;
      --peach:  #FFE0B2;
      --ink:    #5D3A4A;
      --ink2:   #9C6B7E;
      --white:  rgba(255,255,255,0.75);
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #FCE4EC 0%, #F3E5F5 35%, #FFE0B2 65%, #FCE4EC 100%);
      background-size: 400% 400%;
      animation: gradientShift 16s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Floating hearts ── */
    #hearts-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.4;
      pointer-events: none;
      animation: blobFloat linear infinite;
    }
    .blob-1 { width: 340px; height: 340px; background: #F48FB1; top: -100px; left: -100px; animation-duration: 20s; }
    .blob-2 { width: 280px; height: 280px; background: #CE93D8; bottom: -80px; right: -80px; animation-duration: 26s; animation-direction: reverse; }
    .blob-3 { width: 200px; height: 200px; background: #FFCC80; top: 55%; left: 55%; animation-duration: 17s; }

    @keyframes blobFloat {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(28px,-18px) scale(1.06); }
      66%  { transform: translate(-18px,28px) scale(0.96); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 36px;
      padding: 50px 52px 42px;
      max-width: 660px;
      width: 92vw;
      box-shadow:
        0 8px 48px rgba(200, 100, 140, 0.13),
        0 1px 0 rgba(255,255,255,0.95) inset;
      text-align: center;
    }

    .label-top {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.87rem;
      color: var(--ink2);
      margin-bottom: 38px;
    }

    /* ── Countdown ── */
    .countdown-grid {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 34px;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .digit-box {
      background: rgba(255,255,255,0.88);
      border: 1.5px solid rgba(244,143,177,0.35);
      border-radius: 18px;
      padding: 14px 0;
      width: 96px;
      box-shadow:
        0 2px 14px rgba(220,100,140,0.09),
        0 0 0 3px rgba(244,143,177,0.08);
      position: relative;
      overflow: hidden;
    }

    .digit-box::after {
      content: '';
      position: absolute;
      left: 10%; right: 10%;
      top: 50%;
      height: 1px;
      background: rgba(244,143,177,0.2);
    }

    .digit {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 500;
      color: var(--ink);
      line-height: 1;
      display: block;
    }

    .digit.flip {
      animation: flipDown 0.2s ease-out;
    }

    @keyframes flipDown {
      0%   { transform: translateY(-8px); opacity: 0.3; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .unit-label {
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink2);
    }

    .sep {
      font-size: 2.2rem;
      color: var(--rose);
      line-height: 1;
      padding-top: 12px;
      user-select: none;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 26px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.71rem;
      color: var(--ink2);
      margin-bottom: 7px;
    }

    .progress-track {
      height: 8px;
      background: rgba(244,143,177,0.15);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #F48FB1, #CE93D8, #FFCC80);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .footer-note {
      font-size: 0.8rem;
      color: var(--ink2);
      opacity: 0.75;
    }

    /* ── Done ── */
    #done-screen {
      display: none;
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    .done-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }

    .done-title {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 12px;
      animation: popIn 0.7s 0.1s cubic-bezier(.34,1.56,.64,1) both;
    }

    .done-sub {
      font-size: 1rem;
      color: var(--ink2);
      animation: popIn 0.7s 0.2s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      0%   { transform: scale(0.4); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    @media (max-width: 480px) {
      .card { padding: 34px 20px 30px; }
      .digit-box { width: 68px; }
      .countdown-grid { gap: 7px; }
      .sep { font-size: 1.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      body, .blob, .progress-fill { animation: none; }
    }
  </style>
</head>
<body>

  <canvas id="hearts-canvas"></canvas>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card" id="countdown-screen">
    <p class="label-top">❤️ 倒计时中 ❤️</p>
    <h1>还有两个月</h1>
    <p class="subtitle">截止 2026 年 8 月 13 日 22:58</p>

    <div class="countdown-grid">
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-days">00</span></div>
        <span class="unit-label">天</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-hours">00</span></div>
        <span class="unit-label">时</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-mins">00</span></div>
        <span class="unit-label">分</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="d-secs">00</span></div>
        <span class="unit-label">秒</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>开始 · 2026/06/13</span>
        <span id="pct-label">0%</span>
        <span>结束 · 2026/08/13</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <p class="footer-note">❤️ 每一秒都充满爱 ❤️</p>
  </div>

  <div id="done-screen">
    <span class="done-emoji">💖</span>
    <p class="done-title">时间到</p>
    <p class="done-sub">两个月已过，爱意永不停歇 ❤️</p>
  </div>

  <script>
    // ── Target: 2026-08-13 22:58:00 ──
    const TARGET = new Date(2026, 7, 13, 22, 58, 0).getTime();
    const START  = new Date(2026, 5, 13, 22, 58, 0).getTime();

    const pad = n => String(n).padStart(2, '0');

    const el = {
      days:   document.getElementById('d-days'),
      hours:  document.getElementById('d-hours'),
      mins:   document.getElementById('d-mins'),
      secs:   document.getElementById('d-secs'),
      fill:   document.getElementById('progress-fill'),
      pct:    document.getElementById('pct-label'),
      screen: document.getElementById('countdown-screen'),
      done:   document.getElementById('done-screen'),
    };

    function setDigit(elem, val) {
      const newVal = pad(val);
      if (elem.textContent !== newVal) {
        elem.classList.remove('flip');
        void elem.offsetWidth;
        elem.classList.add('flip');
        elem.textContent = newVal;
      }
    }

    function tick() {
      const now  = Date.now();
      const diff = TARGET - now;
      if (diff <= 0) {
        el.screen.style.display = 'none';
        el.done.style.display   = 'block';
        return;
      }
      setDigit(el.days,  Math.floor(diff / 86400000));
      setDigit(el.hours, Math.floor((diff % 86400000) / 3600000));
      setDigit(el.mins,  Math.floor((diff % 3600000)  / 60000));
      setDigit(el.secs,  Math.floor((diff % 60000)    / 1000));

      const pct = Math.min(100, Math.max(0, (now - START) / (TARGET - START) * 100));
      el.fill.style.width = pct.toFixed(2) + '%';
      el.pct.textContent  = pct.toFixed(1) + '%';
    }

    tick();
    setInterval(tick, 1000);

    // ── Floating hearts canvas ──
    const canvas = document.getElementById('hearts-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#F48FB1','#F06292','#E91E63','#CE93D8','#FF80AB','#FF4081','#FFAB91'];

    class Heart {
      constructor() { this.reset(true); }
      reset(init) {
        this.x    = Math.random() * canvas.width;
        this.y    = init ? Math.random() * canvas.height : canvas.height + 30;
        this.size = 10 + Math.random() * 22;
        this.speedY = 0.4 + Math.random() * 1.0;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.alpha  = 0.15 + Math.random() * 0.55;
        this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.02 + Math.random() * 0.03;
        this.rotation = (Math.random() - 0.5) * 0.5;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle   = this.color;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        const s = this.size;
        ctx.beginPath();
        ctx.moveTo(0, s * 0.3);
        ctx.bezierCurveTo(-s * 0.5, -s * 0.2,  -s,        s * 0.1,  0, s);
        ctx.bezierCurveTo( s,        s * 0.1,   s * 0.5,  -s * 0.2,  0, s * 0.3);
        ctx.fill();
        ctx.restore();
      }
      update() {
        this.wobble += this.wobbleSpeed;
        this.x -= this.speedX + Math.sin(this.wobble) * 0.5;
        this.y -= this.speedY;
        if (this.y < -this.size * 2) this.reset(false);
      }
    }

    const hearts = Array.from({ length: 38 }, () => new Heart());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hearts.forEach(h => { h.update(); h.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
